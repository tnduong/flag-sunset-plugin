name: Validate Plugin Layout

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-plugin-layout:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate source-install manifests
        run: node scripts/validate-plugin-layout.mjs
